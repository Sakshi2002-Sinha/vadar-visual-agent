name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install lightweight test dependencies only (no GPU libraries)
          pip install \
            pytest \
            pytest-cov \
            numpy \
            Pillow \
            openai

      - name: Run unit tests
        env:
          OPENAI_API_KEY: sk-test-placeholder
        run: |
          pytest tests/ \
            --ignore=tests/test_vadar_agent.py \
            -v \
            --tb=short \
            --cov=vadar_agent \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest \
            numpy \
            Pillow \
            openai

      - name: Run integration tests (mocked)
        env:
          OPENAI_API_KEY: sk-test-placeholder
        run: |
          pytest tests/test_vadar_agent.py \
            -v \
            --tb=short

  synthetic-demo:
    name: Synthetic demo smoke test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run synthetic demo
        run: python quickstart.py --demo
